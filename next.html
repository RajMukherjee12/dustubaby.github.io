<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Our Sweetest Moments 💞</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    :root {
      --accent:     #ff8acc;
      --accent-dark:#d63384;
      --bg-card:    rgba(20,20,35,0.92);
      --blur:       blur(10px);
      --glow:       rgba(255,140,180,0.6);
      --text-light: #f0f0ff;
    }

    body {
      background: url("images/bg.jpeg") center / cover no-repeat fixed;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 1rem;
      color: var(--text-light);
      font-family: system-ui, -apple-system, sans-serif;
    }

    .photos-card {
      background: var(--bg-card);
      backdrop-filter: var(--blur);
      border-radius: clamp(32px, 8vw, 48px);
      border: 1px solid rgba(255,105,180,0.16);
      box-shadow: 0 20px 60px -10px rgba(0,0,0,0.6);
      padding: clamp(1.6rem, 5vw, 2.2rem) clamp(1.2rem, 4vw, 1.8rem);
      width: 100%;
      max-width: 540px;
    }

    /* Improved Mobile */
    @media (max-width: 576px) {
      .photos-card {
        padding: 1.2rem 0.8rem;
        border-radius: 28px;
      }
      .carousel-inner {
        aspect-ratio: 4 / 3;
      }
    }
  </style>
</head>
<body>

<!-- Background Music -->
<audio id="bgMusic" loop preload="metadata">
    <source src="song.mp4" type="audio/mpeg">
</audio>

  <div class="photos-card container-sm">
    <div class="text-center mb-4">
      <h2 class="title-text">Some Moments 💞</h2>
      <p class="subtitle-text">(swipe or just watch... ✨)</p>
    </div>

    <div class="carousel-wrapper mb-4">
      <div id="memoriesCarousel" class="carousel slide carousel-fade" data-bs-ride="carousel" data-bs-interval="3400">
        <div class="carousel-inner">
          <div class="carousel-item active">
            <img src="images/1.jpg" class="d-block" alt="Sweet memory 1">
          </div>
          <div class="carousel-item">
            <img src="images/2.jpg" class="d-block" alt="Sweet memory 2">
          </div>
          <div class="carousel-item">
            <img src="images/4.jpeg" class="d-block" alt="Sweet memory 4">
          </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#memoriesCarousel" data-bs-slide="prev">
          <span class="carousel-control-prev-icon" aria-hidden="true"></span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#memoriesCarousel" data-bs-slide="next">
          <span class="carousel-control-next-icon" aria-hidden="true"></span>
        </button>
      </div>
    </div>

    <div class="text-center">
      <button class="btn btn-message d-inline-flex align-items-center justify-content-center gap-2"
              onclick="window.location.href='message.html'">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
          <path d="M.05 3.555A2 2 0 0 1 2 2h12a2 2 0 0 1 1.95 1.555L8 8.414zM0 4.697v7.104l5.803-3.558zM6.761 8.83l-6.57 4.027A2 2 0 0 0 2 14h12a2 2 0 0 0 1.808-1.144l-6.57-4.027L8 9.586zm3.436-.586L16 11.801V4.697z"/>
        </svg>
        Read My Letter
      </button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
// Improved Music Persistence
const bgMusic = document.getElementById('bgMusic');

function initMusic() {
    const savedTime = localStorage.getItem('musicTime');
    const shouldPlay = localStorage.getItem('musicPlaying') !== 'false';

    if (savedTime) bgMusic.currentTime = parseFloat(savedTime);

    // Autoplay with user interaction fallback
    const playPromise = bgMusic.play();
    if (playPromise !== undefined) {
        playPromise.catch(() => {
            // User will tap music button if blocked
        });
    }

    // Save progress more reliably
    setInterval(() => {
        if (!bgMusic.paused && bgMusic.currentTime > 0) {
            localStorage.setItem('musicTime', bgMusic.currentTime);
            localStorage.setItem('musicPlaying', 'true');
        }
    }, 800);

    window.addEventListener('beforeunload', () => {
        localStorage.setItem('musicTime', bgMusic.currentTime);
        localStorage.setItem('musicPlaying', !bgMusic.paused);
    });
}

function createMusicButton() {
    const btn = document.createElement('button');
    btn.innerHTML = '🎵';
    btn.style.cssText = `
        position: fixed; bottom: 20px; right: 20px; z-index: 10000;
        width: 56px; height: 56px; border-radius: 50%;
        background: rgba(255,140,180,0.95); border: none;
        font-size: 26px; color: white; box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        cursor: pointer;
    `;
    btn.onclick = () => {
        if (bgMusic.paused) {
            bgMusic.play();
            localStorage.setItem('musicPlaying', 'true');
        } else {
            bgMusic.pause();
            localStorage.setItem('musicPlaying', 'false');
        }
    };
    document.body.appendChild(btn);
}

window.addEventListener('load', () => {
    initMusic();
    createMusicButton();
});
</script>
</body>
</html>
